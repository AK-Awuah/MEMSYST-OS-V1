name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: APP-CODE/package-lock.json
      - run: npm ci
        working-directory: APP-CODE
      - run: npm run lint
        working-directory: APP-CODE

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: APP-CODE/package-lock.json
      - run: npm ci
        working-directory: APP-CODE
      - run: npx tsc --noEmit
        working-directory: APP-CODE

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: APP-CODE/package-lock.json
      - run: npm ci
        working-directory: APP-CODE
      - run: npm test -- --run
        working-directory: APP-CODE

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: APP-CODE/package-lock.json
      - run: npm ci
        working-directory: APP-CODE
      - run: npm run build
        working-directory: APP-CODE
